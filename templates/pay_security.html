    — OR select payment method —

  <!-- Payment Form -->
  <form method="POST">
    <div style="margin-bottom:15px;">
      <label>Payment Method</label>
      <select name="payment_mode" style="width:100%;padding:10px;border-radius:8px;border:1px solid #ccc;" required>

    </div>

    <button type="submit" style="width:100%;padding:14px;background:#0e63d2;color:#fff;border:none;border-radius:10px;font-size:1rem;">
